logging:
  level:
    com.voice.agent: INFO
    org.springframework.web: INFO



mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

voicecal:
  default-user-id: 1
  timezone: Asia/Shanghai

  auth:
    secret: ${VOICECAL_AUTH_SECRET:}
    expire-hours: ${VOICECAL_AUTH_EXPIRE_HOURS:24}
    cookie-secure: ${VOICECAL_AUTH_COOKIE_SECURE:false}

  calendar:
    default-duration-minutes: 60
    default-reminder-minutes: 10
    work-start-time: "09:00"
    work-end-time: "22:00"
    max-free-slot-count: 3
    recurrence-default-count: 12
    recurrence-max-count: 100

  confirm:
    expire-minutes: 5
    single-pending-per-session: true
    auto-execute-safe-writes: true

  conversation:
    clarification-timeout-minutes: 10

  skill:
    location: classpath:/skills/**/*.yaml
    reload-enabled: true

  scheduler:
    scan-fixed-rate-ms: 60000
    max-retry-count: 3

  email:
    enabled: ${VOICECAL_EMAIL_ENABLED:true}
    from: ${MAIL_FROM:${MAIL_USERNAME:3316279993@qq.com}}
    creation-notification-enabled: ${VOICECAL_EMAIL_CREATION_NOTIFICATION_ENABLED:true}
    reminder-enabled: ${VOICECAL_EMAIL_REMINDER_ENABLED:true}

  sse:
    heartbeat-ms: 15000

  mock:
    meeting-enabled: true
    sms-enabled: true
    email-enabled: true

  amap:
    base-url: https://restapi.amap.com/v3
    web-service-key: "189b7989994421d00070a578f84eb265"

llm:
  provider: dashscope
  router:
    enabled: ${LLM_ROUTER_ENABLED:true}
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    model: ${DASHSCOPE_MODEL:qwen-flash}
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
