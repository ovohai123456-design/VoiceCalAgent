server:
  port: 8080

spring:
  application:
    name: voicecal-agent

  datasource:
    url: jdbc:mysql://62.234.45.155:13306/voicecal?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai



mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

voicecal:
  default-user-id: 1
  timezone: Asia/Shanghai

  calendar:
    default-duration-minutes: 60
    default-reminder-minutes: 10
    work-start-time: "09:00"
    work-end-time: "22:00"
    max-free-slot-count: 3

  confirm:
    expire-minutes: 5
    single-pending-per-session: true

  skill:
    location: classpath:/skills/**/*.yaml
    reload-enabled: true

  scheduler:
    scan-fixed-rate-ms: 60000
    max-retry-count: 3

  mock:
    meeting-enabled: true
    sms-enabled: true
    email-enabled: true

llm:
  provider: dashscope
  router:
    enabled: true
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen-flash
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    timeout-ms: 15000
    chat:
      options:
        model: qwen-plus
    embedding:
      options:
        model: text-embedding-v4
        dimensions: 1024
